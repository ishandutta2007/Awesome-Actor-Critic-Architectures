<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="50%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#311042" />
    </linearGradient>
    
    <!-- Accent Gradient for Text/Shapes -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="50%" stop-color="#c084fc" />
      <stop offset="100%" stop-color="#fb7185" />
    </linearGradient>

    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.3"/>
    </pattern>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGrad)" />
  <rect width="1200" height="400" fill="url(#grid)" />

  <!-- Animated-looking abstract neural pathways / circles -->
  <g opacity="0.25">
    <circle cx="200" cy="200" r="120" fill="none" stroke="url(#accentGrad)" stroke-width="1.5" />
    <circle cx="1000" cy="200" r="150" fill="none" stroke="url(#accentGrad)" stroke-width="1" />
    <path d="M 200 200 Q 600 50 1000 200" fill="none" stroke="url(#accentGrad)" stroke-width="2" stroke-dasharray="8 4" />
    <path d="M 200 200 Q 600 350 1000 200" fill="none" stroke="url(#accentGrad)" stroke-width="2" stroke-dasharray="5 5" />
    <circle cx="600" cy="200" r="80" fill="none" stroke="#ffffff" stroke-width="0.5" stroke-dasharray="3 3" />
  </g>

  <!-- Central Title & Subtitle -->
  <g text-anchor="middle" filter="url(#glow)">
    <!-- Glow behind Title -->
    <text x="600" y="195" font-family="'Outfit', 'Inter', system-ui, sans-serif" font-weight="900" font-size="64" fill="url(#accentGrad)" opacity="0.9">AWESOME ACTOR-CRITIC</text>
    <text x="600" y="260" font-family="'Outfit', 'Inter', system-ui, sans-serif" font-weight="700" font-size="28" fill="#e2e8f0" letter-spacing="4">ARCHITECTURES IN REINFORCEMENT LEARNING</text>
  </g>

  <!-- Small details / nodes representing Actor & Critic -->
  <g font-family="monospace" font-size="12" fill="#94a3b8" opacity="0.8">
    <circle cx="200" cy="200" r="6" fill="#38bdf8" />
    <text x="200" y="185" text-anchor="middle">ACTOR (Policy π)</text>

    <circle cx="1000" cy="200" r="6" fill="#fb7185" />
    <text x="1000" y="185" text-anchor="middle">CRITIC (Value V / Q)</text>
  </g>
</svg>
